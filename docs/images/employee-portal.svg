<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <!-- Background -->
  <rect width="1200" height="700" fill="#07111f"/>
  
  <!-- Header -->
  <rect width="1200" height="80" fill="#0d1a2b"/>
  <text x="50" y="50" font-size="32" fill="#63d2ff" font-weight="bold">HR Assist Pro</text>
  <text x="50" y="70" font-size="14" fill="#9db0c8">Enterprise HR Policy Q&A</text>
  
  <!-- Tabs -->
  <rect x="50" y="90" width="200" height="40" fill="#63d2ff" rx="5"/>
  <text x="150" y="118" font-size="14" fill="#07111f" font-weight="bold" text-anchor="middle">Employee Portal</text>
  
  <rect x="260" y="90" width="200" height="40" fill="transparent" stroke="#63d2ff" stroke-width="2" rx="5"/>
  <text x="360" y="118" font-size="14" fill="#63d2ff" text-anchor="middle">HR Administrator Panel</text>
  
  <rect x="470" y="90" width="200" height="40" fill="transparent" stroke="#63d2ff" stroke-width="2" rx="5"/>
  <text x="570" y="118" font-size="14" fill="#63d2ff" text-anchor="middle">System Status</text>
  
  <!-- Input Section -->
  <rect x="50" y="150" width="1100" height="120" fill="#0d1a2b" rx="8"/>
  <text x="70" y="175" font-size="16" fill="#eef4fb" font-weight="bold">Ask HR a Question</text>
  <rect x="70" y="195" width="1060" height="50" fill="#0a1423" stroke="#63d2ff" stroke-width="2" rx="5"/>
  <text x="85" y="225" font-size="14" fill="#9db0c8">How many annual leave days do I have? What is the reimbursement process?</text>
  
  <!-- Button -->
  <rect x="70" y="260" width="150" height="40" fill="#34d399" rx="5"/>
  <text x="145" y="287" font-size="14" fill="#07111f" font-weight="bold" text-anchor="middle">Get HR Answer</text>
  
  <!-- Response Section -->
  <rect x="50" y="320" width="1100" height="350" fill="#0d1a2b" rx="8"/>
  <text x="70" y="345" font-size="16" fill="#eef4fb" font-weight="bold">Response</text>
  
  <!-- Response Content -->
  <rect x="70" y="365" width="1060" height="285" fill="#0a1423" rx="5"/>
  <text x="85" y="390" font-size="13" fill="#34d399" font-weight="bold">Annual Leave Policy</text>
  <text x="85" y="415" font-size="12" fill="#eef4fb">You are entitled to 20 days of annual leave per calendar year.</text>
  <text x="85" y="435" font-size="12" fill="#eef4fb">Reimbursement Process:</text>
  <text x="85" y="455" font-size="12" fill="#eef4fb">1. Submit expense report within 30 days</text>
  <text x="85" y="475" font-size="12" fill="#eef4fb">2. Attach original receipts</text>
  <text x="85" y="495" font-size="12" fill="#eef4fb">3. Manager approval required</text>
  <text x="85" y="515" font-size="12" fill="#eef4fb">4. HR processes within 5-7 business days</text>
  
  <!-- Citation -->
  <text x="85" y="545" font-size="11" fill="#a78bfa" font-style="italic">Source: Leave_Policy.pdf (Page 2)</text>
  
  <!-- Footer -->
  <text x="50" y="690" font-size="12" fill="#9db0c8">🔒 Powered by Gemini 2.0 | 📊 ChromaDB | 🔄 FlashRank</text>
</svg>