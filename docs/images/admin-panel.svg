<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <!-- Background -->
  <rect width="1200" height="800" fill="#07111f"/>
  
  <!-- Header -->
  <rect width="1200" height="80" fill="#0d1a2b"/>
  <text x="50" y="50" font-size="32" fill="#63d2ff" font-weight="bold">HR Assist Pro</text>
  <text x="50" y="70" font-size="14" fill="#9db0c8">Administration Dashboard</text>
  
  <!-- Tabs -->
  <rect x="50" y="90" width="200" height="40" fill="transparent" stroke="#63d2ff" stroke-width="2" rx="5"/>
  <text x="150" y="118" font-size="14" fill="#63d2ff" text-anchor="middle">Employee Portal</text>
  
  <rect x="260" y="90" width="200" height="40" fill="#63d2ff" rx="5"/>
  <text x="360" y="118" font-size="14" fill="#07111f" font-weight="bold" text-anchor="middle">HR Administrator</text>
  
  <rect x="470" y="90" width="200" height="40" fill="transparent" stroke="#63d2ff" stroke-width="2" rx="5"/>
  <text x="570" y="118" font-size="14" fill="#63d2ff" text-anchor="middle">System Status</text>
  
  <!-- Upload Section -->
  <rect x="50" y="150" width="540" height="180" fill="#0d1a2b" rx="8"/>
  <text x="70" y="175" font-size="16" fill="#eef4fb" font-weight="bold">Upload HR Policy Documents</text>
  <rect x="70" y="195" width="500" height="80" fill="#0a1423" stroke="#34d399" stroke-width="2" stroke-dasharray="5,5" rx="5"/>
  <text x="320" y="240" font-size="14" fill="#34d399" text-anchor="middle" font-weight="bold">📁 Drop PDF files here or click to browse</text>
  <button x="170" y="295" width="300" height="35" fill="#34d399" rx="5"/>
  <text x="320" y="318" font-size="13" fill="#07111f" text-anchor="middle" font-weight="bold">Upload Document</text>
  
  <!-- Indexed Documents -->
  <rect x="620" y="150" width="530" height="180" fill="#0d1a2b" rx="8"/>
  <text x="640" y="175" font-size="16" fill="#eef4fb" font-weight="bold">Indexed Documents (5)</text>
  
  <rect x="640" y="195" width="490" height="120" fill="#0a1423" rx="5"/>
  <text x="655" y="220" font-size="12" fill="#34d399">✓ employee_handbook.pdf</text>
  <text x="655" y="245" font-size="12" fill="#34d399">✓ leave_policy.pdf</text>
  <text x="655" y="270" font-size="12" fill="#34d399">✓ performance_review_guidelines.pdf</text>
  <text x="655" y="295" font-size="12" fill="#34d399">✓ reimbursement_policy.pdf</text>
  <text x="655" y="305" font-size="11" fill="#f59e0b">+ 1 more</text>
  
  <!-- Management Section -->
  <rect x="50" y="350" width="1100" height="380" fill="#0d1a2b" rx="8"/>
  <text x="70" y="375" font-size="16" fill="#eef4fb" font-weight="bold">Document Management</text>
  
  <!-- Table -->
  <rect x="70" y="400" width="1060" height="310" fill="#0a1423" rx="5"/>
  
  <!-- Table Header -->
  <text x="85" y="425" font-size="12" fill="#63d2ff" font-weight="bold">Document Name</text>
  <text x="400" y="425" font-size="12" fill="#63d2ff" font-weight="bold">Pages</text>
  <text x="500" y="425" font-size="12" fill="#63d2ff" font-weight="bold">Chunks</text>
  <text x="620" y="425" font-size="12" fill="#63d2ff" font-weight="bold">Indexed Date</text>
  <text x="900" y="425" font-size="12" fill="#63d2ff" font-weight="bold">Actions</text>
  
  <!-- Divider -->
  <line x1="70" y1="435" x2="1130" y2="435" stroke="#34a382" stroke-width="1"/>
  
  <!-- Table Rows -->
  <text x="85" y="465" font-size="11" fill="#eef4fb">employee_handbook.pdf</text>
  <text x="400" y="465" font-size="11" fill="#eef4fb">12</text>
  <text x="500" y="465" font-size="11" fill="#eef4fb">24</text>
  <text x="620" y="465" font-size="11" fill="#9db0c8">2026-06-11</text>
  <rect x="900" y="450" width="60" height="25" fill="#ef4444" rx="3"/>
  <text x="930" y="468" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">Delete</text>
  
  <text x="85" y="505" font-size="11" fill="#eef4fb">leave_policy.pdf</text>
  <text x="400" y="505" font-size="11" fill="#eef4fb">8</text>
  <text x="500" y="505" font-size="11" fill="#eef4fb">16</text>
  <text x="620" y="505" font-size="11" fill="#9db0c8">2026-06-11</text>
  <rect x="900" y="490" width="60" height="25" fill="#ef4444" rx="3"/>
  <text x="930" y="508" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">Delete</text>
  
  <text x="85" y="545" font-size="11" fill="#eef4fb">performance_review_guidelines.pdf</text>
  <text x="400" y="545" font-size="11" fill="#eef4fb">6</text>
  <text x="500" y="545" font-size="11" fill="#eef4fb">12</text>
  <text x="620" y="545" font-size="11" fill="#9db0c8">2026-06-11</text>
  <rect x="900" y="530" width="60" height="25" fill="#ef4444" rx="3"/>
  <text x="930" y="548" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">Delete</text>
  
  <!-- Control Buttons -->
  <rect x="70" y="675" width="150" height="40" fill="#f59e0b" rx="5"/>
  <text x="145" y="702" font-size="13" fill="#07111f" text-anchor="middle" font-weight="bold">Re-index All</text>
  
  <rect x="240" y="675" width="150" height="40" fill="#ef4444" rx="5"/>
  <text x="315" y="702" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">Clear Database</text>
</svg>